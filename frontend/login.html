<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — MatchCV</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --border: #e3e5e8;
      --text: #1a1d21;
      --text-muted: #5b6470;
      --accent: #1f2937;
      --accent-hover: #111827;
      --danger: #b9573a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
      font-weight: 600;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin: 0 0 28px;
    }
    .btn-google {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-google:hover:not(:disabled) {
      background: #f0f1f3;
      border-color: #c9ccd2;
    }
    .btn-google:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #e3e5e8;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-google.loading .spinner { display: block; }
    .btn-google.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      display: none;
      margin-top: 16px;
      padding: 10px 12px;
      background: #fdf4f1;
      border: 1px solid #f0d4cb;
      border-radius: 6px;
      color: var(--danger);
      font-size: 0.85rem;
      text-align: left;
    }
    .error.visible { display: block; }
    .footer-link {
      margin-top: 24px;
      font-size: 0.82rem;
    }
    .footer-link a { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="card">
    <h1>MatchCV</h1>
    <p class="subtitle">Sign in to manage your profile and job search</p>

    <button type="button" id="google-btn" class="btn-google">
      <span class="spinner" aria-hidden="true"></span>
      <span class="btn-label">Sign in with Google</span>
    </button>

    <div id="error" class="error" role="alert"></div>

  </div>

  <script src="/auth.js"></script>
  <script>
    const $btn = document.getElementById("google-btn");
    const $error = document.getElementById("error");

    function showError(message) {
      $error.textContent = message;
      $error.classList.add("visible");
    }

    function clearError() {
      $error.textContent = "";
      $error.classList.remove("visible");
    }

    async function checkExistingSession() {
      const token = getAccessToken();
      if (!token) return;

      try {
        const res = await fetch(`${API_BASE}/auth/me`, { headers: authHeaders() });
        if (res.ok) {
          window.location.replace("/");
          return;
        }
        clearAuth();
      } catch {
        clearAuth();
      }
    }

    async function signInWithGoogle() {
      clearError();
      $btn.disabled = true;
      $btn.classList.add("loading");

      try {
        const res = await fetch(`${API_BASE}/auth/login`);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showError(data.error || "Could not start sign-in. Please try again.");
          return;
        }
        if (!data.url) {
          showError("Sign-in URL missing from server response.");
          return;
        }
        window.location.href = data.url;
      } catch {
        showError("Network error. Is the API running at " + API_BASE + "?");
      } finally {
        $btn.disabled = false;
        $btn.classList.remove("loading");
      }
    }

    /** Supabase may redirect here with ?error=...&error_description=... */
    function showOAuthCallbackError() {
      const params = new URLSearchParams(window.location.search);
      const err = params.get("error") || params.get("error_code");
      const desc = params.get("error_description") || params.get("msg");
      if (!err && !desc) return;

      let message = desc || err;
      if (message.includes("not enabled") || message.includes("validation_failed")) {
        message =
          "Google sign-in is not enabled in Supabase. Go to Supabase Dashboard → " +
          "Authentication → Providers → Google, enable it, and add your Google OAuth credentials.";
      }
      showError(message);
      history.replaceState(null, "", window.location.pathname);
    }

    $btn.addEventListener("click", signInWithGoogle);
    showOAuthCallbackError();
    checkExistingSession();
  </script>
</body>
</html>
