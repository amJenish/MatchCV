<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile — MatchCV</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --border: #e3e5e8;
      --border-strong: #c9ccd2;
      --text: #1a1d21;
      --text-muted: #5b6470;
      --accent: #1f2937;
      --accent-hover: #111827;
      --pill: #eef0f3;
      --danger: #b9573a;
      --success-bg: #e8f0ea;
      --success-text: #2d4a35;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .btn {
      font: inherit;
      padding: 8px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover:not(:disabled) { background: var(--pill); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 20px 48px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px 24px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
    }
    .name {
      margin: 0 0 4px;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .email {
      color: var(--text-muted);
      margin: 0 0 24px;
      font-size: 0.95rem;
    }
    .meta { display: grid; gap: 16px; }
    .meta-item label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }
    .meta-item p { margin: 0; font-size: 0.95rem; }
    .status-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--pill);
      font-size: 0.88rem;
    }
    .status-pill.done {
      background: var(--success-bg);
      color: var(--success-text);
    }
    .loading, .error {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    .error { color: var(--danger); }
    .nav-links { margin-top: 24px; font-size: 0.88rem; }
    .nav-links a { color: var(--text-muted); margin-right: 16px; }

    /* Resume upload card */
    .upload-card h3 {
      margin: 0 0 6px;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .upload-card p.help {
      margin: 0 0 18px;
      color: var(--text-muted);
      font-size: 0.92rem;
    }
    .upload-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .upload-status {
      margin-top: 14px;
      font-size: 0.92rem;
      color: var(--text-muted);
      min-height: 1.4em;
    }
    .upload-status.error { color: var(--danger); }
    .upload-status.success { color: var(--success-text); }

    /* Signal profile preview after upload */
    .signal-grid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    .signal-item .label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .signal-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--pill);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>MatchCV</h1>
    <button type="button" id="signout-btn" class="btn">Sign out</button>
  </header>

  <main id="main">
    <div class="loading" id="profile-loading">Loading profile…</div>
  </main>

  <script src="/auth.js"></script>
  <script>
    const $main = document.getElementById("main");
    const $signout = document.getElementById("signout-btn");

    function formatDate(iso) {
      if (!iso) return "—";
      try {
        return new Date(iso).toLocaleDateString(undefined, {
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      } catch {
        return iso;
      }
    }

    function displayName(profile) {
      const parts = [profile.full_name, profile.last_name].filter(Boolean);
      if (parts.length) return parts.join(" ");
      return profile.email || "User";
    }

    function escapeHtml(value) {
      if (value == null) return "";
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function pillRow(items) {
      if (!items || items.length === 0) {
        return `<span class="pill" style="opacity: 0.6;">none</span>`;
      }
      return items.map((x) => `<span class="pill">${escapeHtml(x)}</span>`).join("");
    }

    function renderSignalProfile(signal) {
      // Empty section is hidden; re-uploading wipes the previous render.
      const wrap = document.getElementById("signal-preview");
      if (!wrap) return;
      if (!signal || Object.keys(signal).length === 0) {
        wrap.innerHTML = "";
        return;
      }
      wrap.innerHTML = `
        <div class="signal-grid">
          <div class="signal-item">
            <span class="label">Suitable levels</span>
            <div class="signal-pills">${pillRow(signal.suitable_levels)}</div>
          </div>
          <div class="signal-item">
            <span class="label">Primary roles</span>
            <div class="signal-pills">${pillRow(signal.primary_roles)}</div>
          </div>
          <div class="signal-item">
            <span class="label">Core skills</span>
            <div class="signal-pills">${pillRow(signal.core_skills)}</div>
          </div>
          <div class="signal-item">
            <span class="label">Search keywords</span>
            <div class="signal-pills">${pillRow(signal.search_keywords)}</div>
          </div>
        </div>`;
    }

    function setUploadStatus(message, kind) {
      const el = document.getElementById("upload-status");
      if (!el) return;
      el.textContent = message || "";
      el.classList.toggle("error", kind === "error");
      el.classList.toggle("success", kind === "success");
    }

    function disableUploadControls(disabled) {
      const input = document.getElementById("resume-input");
      const btn = document.getElementById("resume-pick-btn");
      if (input) input.disabled = disabled;
      if (btn) btn.disabled = disabled;
    }

    async function handleResumeFile(file) {
      const lower = (file.name || "").toLowerCase();
      if (!lower.endsWith(".pdf") && !lower.endsWith(".docx")) {
        setUploadStatus("Please upload a PDF or DOCX file.", "error");
        return;
      }

      disableUploadControls(true);
      setUploadStatus("Parsing your resume… this can take up to a minute.", null);

      const formData = new FormData();
      formData.append("file", file);

      try {
        const data = await apiPostMultipart("/api/resume/upload", formData);
        setUploadStatus(
          data.message ||
            "Resume parsed. We are searching for new jobs in the background.",
          "success",
        );
        renderSignalProfile(data.signal_profile || {});
        // Reflect the new resume_parsed=true status in the profile card.
        const pill = document.getElementById("resume-status-pill");
        if (pill) {
          pill.textContent = "Resume uploaded";
          pill.className = "status-pill done";
        }
      } catch (err) {
        if (err.message === "unauthorized") return;
        setUploadStatus(err.message || "Upload failed.", "error");
      } finally {
        disableUploadControls(false);
      }
    }

    function renderProfile(profile) {
      const resumeLabel = profile.resume_parsed
        ? "Resume uploaded"
        : "No resume uploaded yet";
      const resumeClass = profile.resume_parsed
        ? "status-pill done"
        : "status-pill";

      $main.innerHTML = `
        <div class="card">
          <h2 class="name">${escapeHtml(displayName(profile))}</h2>
          <p class="email">${escapeHtml(profile.email || "")}</p>
          <div class="meta">
            <div class="meta-item">
              <label>Account created</label>
              <p>${escapeHtml(formatDate(profile.created_at))}</p>
            </div>
            <div class="meta-item">
              <label>Resume</label>
              <p><span id="resume-status-pill" class="${resumeClass}">${escapeHtml(resumeLabel)}</span></p>
            </div>
          </div>
          <div class="nav-links">
            <a href="/">Job listings</a>
          </div>
        </div>

        <div class="card upload-card">
          <h3>${profile.resume_parsed ? "Re-upload resume" : "Upload resume"}</h3>
          <p class="help">
            We re-parse your resume into structured sections, rebuild your
            signal profile, and start a fresh streaming search for matching
            roles. Existing jobs already in your queue are preserved.
          </p>
          <div class="upload-row">
            <input type="file" id="resume-input" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
            <button type="button" class="btn btn-primary" id="resume-pick-btn">Choose resume (.pdf or .docx)</button>
          </div>
          <div id="upload-status" class="upload-status"></div>
          <div id="signal-preview"></div>
        </div>`;

      const input = document.getElementById("resume-input");
      const pickBtn = document.getElementById("resume-pick-btn");
      pickBtn.addEventListener("click", () => input.click());
      input.addEventListener("change", () => {
        if (input.files && input.files[0]) {
          const f = input.files[0];
          input.value = "";
          handleResumeFile(f);
        }
      });

      // Best-effort: if the server already has the user's signal_profile,
      // surface it so they don't have to re-upload to inspect it.
      if (profile.signal_profile) {
        renderSignalProfile(profile.signal_profile);
      }
    }

    $signout.addEventListener("click", signOut);

    (async function init() {
      const me = await requireAuth();
      if (!me) return;
      // requireAuth already returns the /auth/me payload — render directly.
      renderProfile(me);
    })();
  </script>
</body>
</html>
